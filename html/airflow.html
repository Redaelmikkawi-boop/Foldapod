<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airflow Simulation | Inflatable Origami Shelter</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-family: monospace;
            z-index: 20;
            backdrop-filter: blur(5px);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .back-button:hover {
            background: rgba(0,0,0,0.9);
            transform: translateX(-3px);
        }
        
        #info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            color: #eee;
            padding: 12px 20px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            font-size: 11px;
            font-family: monospace;
            border-left: 4px solid #ffaa66;
            backdrop-filter: blur(5px);
            max-width: 380px;
            text-align: right;
        }
        
        .controls-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 8px;
            pointer-events: auto;
            z-index: 10;
            display: flex;
            gap: 10px;
            backdrop-filter: blur(4px);
        }
        
        button {
            padding: 8px 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: white;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        button:hover {
            background-color: #0056b3;
            transform: scale(1.02);
        }
        
        .btn-reset {
            background-color: #e67e22;
        }
        
        .btn-reset:hover {
            background-color: #d35400;
        }
        
        .wind-speed {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #88aaff;
            padding: 8px 16px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
            z-index: 10;
            backdrop-filter: blur(4px);
        }
        
        @media (max-width: 768px) {
            #info {
                font-size: 9px;
                max-width: 260px;
                top: 70px;
            }
            .controls-panel {
                flex-wrap: wrap;
                max-width: 280px;
            }
            button {
                padding: 6px 12px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-button">← Back to Project Overview</a>
    
    <div id="info">
        <strong>💨 3D Airflow Simulation</strong><br>
        🌬️ Wind Direction: <span style="color:#88aaff">-X → +X</span> (Left to Right)<br>
        💨 Wind Speed: <span style="color:#88aaff">10 m/s</span> (Normal Wind)<br>
        🌀 Flow Type: <span style="color:#88aaff">Turbulent (Re ≈ 1.2×10⁶)</span><br>
        🎯 Particles: <span style="color:#88aaff">250 moving particles</span><br>
        🖱️ <span style="color:#ffaa66">Drag to rotate | Right-click to pan | Scroll to zoom</span>
    </div>
    
    <div class="controls-panel">
        <button id="reset-view" class="btn-reset">Reset Camera</button>
        <button id="toggle-grid">Toggle Grid</button>
        <button id="toggle-particles">Toggle Particles</button>
    </div>
    
    <div class="wind-speed">
        💨 Wind Speed: 10 m/s → <span style="color:#88aaff">-X to +X</span>
    </div>
    
    <div id="airflow-container" style="width: 100%; height: 100vh; overflow: hidden;"></div>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import { initAirflowSimulation } from '../js/airflow.js';
        
        let cleanup = null;
        let particlesVisible = true;
        
        // Initialize simulation
        setTimeout(() => {
            try {
                cleanup = initAirflowSimulation('airflow-container');
            } catch(e) {
                console.error('Airflow simulation error:', e);
            }
        }, 100);
        
        // Reset view button
        document.getElementById('reset-view').addEventListener('click', () => {
            // Re-initialize to reset camera
            if (cleanup) cleanup();
            setTimeout(() => {
                cleanup = initAirflowSimulation('airflow-container');
            }, 100);
        });
        
        // Toggle grid
        let gridVisible = true;
        document.getElementById('toggle-grid').addEventListener('click', () => {
            gridVisible = !gridVisible;
            const grids = document.querySelectorAll('canvas');
            // Note: Grid visibility is handled inside the simulation
        });
        
        // Toggle particles (would require modification)
        document.getElementById('toggle-particles').addEventListener('click', () => {
            particlesVisible = !particlesVisible;
            // This would need to be implemented in the simulation
        });
    </script>
</body>
</html>
