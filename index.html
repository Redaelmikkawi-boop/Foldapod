<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Origami FYP - Triangular Face on Ground</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            font-family: monospace;
            border-left: 4px solid #ffaa66;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 8px;
            pointer-events: auto;
            z-index: 10;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 8px 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #007bff;
            color: white;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        .status {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: #0f0;
            padding: 5px 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="info">
        <strong>📐 Triangular Face (Ground Reference)</strong><br>
        📏 Bottom Edge: 378 mm (on ground)<br>
        📏 Slant Edge: 605.3 mm<br>
        📏 Height: 949 mm (vertical from ground)<br>
        📍 Slant Face Midpoint: (1210.5 mm, 605.3 mm)<br>
        💪 Thickness: 5 mm
    </div>
    <div class="controls">
        <button id="toggle-wireframe">Toggle Wireframe</button>
        <button id="reset-view">Reset View</button>
        <button id="toggle-grid">Toggle Grid</button>
    </div>
    <div class="status" id="status">
        ✅ Triangle on ground | Slant face created
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
